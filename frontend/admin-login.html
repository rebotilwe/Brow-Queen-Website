<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Brow Queen</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap');
        
        :root { 
            --gold: #D4A396;
            --text-dark: #2C2421;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #FDF8F5 0%, #FAF4EF 100%);
            min-height: 100vh;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            border: 1px solid #E8E0DB;
        }
        
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #E8E0DB;
            border-radius: 16px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 163, 150, 0.15);
        }
        
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background: var(--text-dark);
            transform: translateY(-2px);
        }
        
        .logo-image {
            height: 60px;
            width: auto;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <img src="images/logo1.png" alt="Brow Queen" class="logo-image mx-auto mb-4">
            <h1 class="font-serif text-3xl">Admin Dashboard</h1>
            <p class="text-[#6B5E58] text-sm mt-2">Sign in to manage your bookings</p>
        </div>
        
        <div class="login-card">
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-[#2C2421] mb-2">Email Address</label>
                    <input type="email" id="admin-email" class="input-field" placeholder="admin@browqueen.co.za" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-[#2C2421] mb-2">Password</label>
                    <input type="password" id="admin-password" class="input-field" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            
            <div id="login-error" class="mt-4 text-center text-sm text-red-500 hidden"></div>
            
            <div class="mt-6 text-center text-xs text-[#A89A94]">
                <p>Demo credentials (once Supabase is set up):</p>
                <p>Email: admin@browqueen.co.za | Password: admin123</p>
            </div>
        </div>
    </div>

    <script>
        // For now, use simple authentication
        // Once Supabase is set up, replace with Supabase Auth
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            
            // Simple validation for demo
            // Replace with Supabase auth when available
            if (email === 'admin@browqueen.co.za' && password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminEmail', email);
                window.location.href = 'admin-dashboard.html';
            } else {
                errorDiv.classList.remove('hidden');
                errorDiv.textContent = 'Invalid email or password';
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
